name: Update guild stats

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest hiscores
        run: node scripts/fetch-stats.js

      - name: Commit updated data
        run: |
          git config user.name "guild-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          git diff --cached --quiet || git commit -m "Update stats snapshot"
          git push
